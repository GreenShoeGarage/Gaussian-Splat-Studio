services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/runs:/app/runs
    environment:
      - GSS_REAL_MODE=${GSS_REAL_MODE:-0}
      - GSS_FRAME_RATE=${GSS_FRAME_RATE:-2}

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API=http://localhost:8000
    depends_on:
      - backend
