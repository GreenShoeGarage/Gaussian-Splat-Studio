services:
  backend:
    environment:
      - MAKER_SPLAT_REAL_MODE=1
      - MAKER_SPLAT_ENGINE=nerfstudio
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
